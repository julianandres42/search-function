AWSTemplateFormatVersion: '2010-09-09'
Description: 'CodePipeline with GitHub, CodeBuild (exercise-codebuild), and CloudFormation for Lambda deployment'

Parameters:
  ConnectionArn:
    Description: The CodeConnections Connection ARN from Settings > Connections.
    Type: String
  FullRepositoryId:
    Description: Your GitHub repository ID. Example: julianandres42/search-function
    Type: String
  BranchName:
    Description: The branch name that will trigger the pipeline execution automatically.
    Type: String
    Default: main
  CodePipelineName:
    Description: Name for this specific deployment pipeline.
    Type: String
    Default: DeployExercise-4
  StackName:
    Description: The CloudFormation stack name that will create or update your Lambda function.
    Type: String
  TemplatePath:
    Description: The filename of the CloudFormation infrastructure template inside your repository.
    Type: String
    Default: template.yml
  CloudFormationResourcePermissions:
    Description: The IAM Role ARN that CloudFormation will assume to provision resources (S3, Lambda, etc.).
    Type: String

Resources:
  # S3 Bucket to store the intermediate pipeline artifacts
  CodePipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  # Pipeline Definition
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      ArtifactStore:
        Location: !Ref CodePipelineArtifactsBucket
        Type: S3
      ExecutionMode: QUEUED
      Name: !Ref CodePipelineName
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineRole.Arn
      Stages:
        # Stage 1: Source (Downloads code from your GitHub repository)
        - Name: Source
          Actions:
            - Name: CodeConnections
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput
              RoleArn: !GetAtt CodePipelineSourceActionRole.Arn
              RunOrder: 1

        # Stage 2: Build (Utilizes your existing 'exercise-codebuild' project)
        - Name: Build
          Actions:
            - Name: CodeBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: exercise-codebuild  # <-- Integrated your exact project name
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        # Stage 3: Deploy (Applies step 4 instructions: Required IAM capabilities)
        - Name: Deploy
          Actions:
            - Name: CloudFormation
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                # Explicitly defining the required security and IAM capabilities from step 4
                Capabilities: CAPABILITY_IAM,CAPABILITY_AUTO_EXPAND,CAPABILITY_NAMED_IAM
                StackName: !Ref StackName
                # Looks for the packaged infrastructure template emitted by CodeBuild
                TemplatePath: !Sub BuildOutput::${TemplatePath}
                RoleArn: !Ref CloudFormationResourcePermissions
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1
    DependsOn:
      - CodePipelineRoleDefaultPolicy

  # --- Security Roles and IAM Policies ---
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ://amazonaws.com

  CodePipelineRoleDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CodePipelineRoleDefaultPolicy
      Roles:
        - !Ref CodePipelineRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:Abort*
              - s3:DeleteObject*
              - s3:GetBucket*
              - s3:GetObject*
              - s3:List*
              - s3:PutObject*
            Resource:
              - !GetAtt CodePipelineArtifactsBucket.Arn
              - !Sub ${CodePipelineArtifactsBucket.Arn}/*
          - Effect: Allow
            Action:
              - codebuild:StartBuild
              - codebuild:BatchGetBuilds
            Resource: '*'
          - Effect: Allow
            Action: sts:AssumeRole
            Resource:
              - !GetAtt CodePipelineSourceActionRole.Arn

  CodePipelineSourceActionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root

  CodePipelineSourceActionRoleDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CodePipelineSourceActionRoleDefaultPolicy
      Roles:
        - !Ref CodePipelineSourceActionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: codestar-connections:UseConnection
            Effect: Allow
            Resource: !Ref ConnectionArn
          - Action:
              - s3:PutObject*
              - s3:GetObject*
            Resource: !Sub ${CodePipelineArtifactsBucket.Arn}/*
